services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: online-shop-api
    restart: unless-stopped
    ports:
      - "${PORT:-4000}:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      DB_URL: mysql://${DB_USER:-shop_user}:${DB_PASS:-shop_pass}@db:3306/${DB_NAME:-shop_db}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads

  db:
    image: mysql
    container_name: online-shop-db
    restart: unless-stopped
    ports:
      - "${DB_PORT:-3306}:3306"
    environment:
      MYSQL_USER: ${DB_USER:-shop_user}
      MYSQL_PASSWORD: ${DB_PASS:-shop_pass}
      MYSQL_DATABASE: ${DB_NAME:-shop_db}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_pass}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u${DB_USER:-shop_user}", "-p${DB_PASS:-shop_pass}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
  uploads: